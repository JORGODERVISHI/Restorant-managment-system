<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rezervo Tavolinë - Restaurant System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      padding: 2.5rem;
      max-width: 450px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .logo h1 {
      font-size: 2rem;
      color: #667eea;
      margin-bottom: 0.5rem;
    }
    
    .logo p {
      color: #6b7280;
      font-size: 0.875rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #374151;
      font-size: 0.875rem;
    }
    
    input, select {
      width: 100%;
      padding: 0.875rem;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.2s;
    }
    
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 1rem;
      border: none;
      border-radius: 10px;
      font-size: 1.125rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .btn-submit:hover {
      transform: translateY(-2px);
    }
    
    .btn-submit:active {
      transform: translateY(0);
    }
    
    .success-message {
      background: #d1fae5;
      border: 2px solid #10b981;
      color: #065f46;
      padding: 1.5rem;
      border-radius: 10px;
      text-align: center;
      display: none;
    }
    
    .success-message.show {
      display: block;
      animation: slideIn 0.3s ease;
    }
    
    .code-display {
      font-size: 2.5rem;
      font-weight: 700;
      color: #667eea;
      margin: 1rem 0;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .error {
      background: #fee2e2;
      border: 2px solid #ef4444;
      color: #991b1b;
      padding: 1rem;
      border-radius: 10px;
      margin-bottom: 1rem;
      display: none;
    }
    
    .error.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>🍽️ Restaurant XYZ</h1>
      <p>Rezervo tavolinën tënde</p>
    </div>
    
    <div class="error" id="error"></div>
    
    <form id="reservationForm">
      <div class="form-group">
        <label>📅 Data</label>
        <input type="date" id="date" required>
      </div>
      
      <div class="form-group">
        <label>⏰ Ora</label>
        <input type="time" id="time" required>
      </div>
      
      <div class="form-group">
        <label>👤 Emri</label>
        <input type="text" id="name" placeholder="Emri juaj" required>
      </div>
      
      <div class="form-group">
        <label>📞 Telefon</label>
        <input type="tel" id="phone" placeholder="+355 69 123 4567" required>
      </div>
      
      <div class="form-group">
        <label>🏓 Tavolina</label>
        <select id="table" required>
          <option value="">Zgjidhni tavolinë...</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>👥 Nr. Personash</label>
        <select id="partySize" required>
          <option value="">Zgjidhni...</option>
          <option value="1">1 person</option>
          <option value="2">2 persona</option>
          <option value="3">3 persona</option>
          <option value="4">4 persona</option>
          <option value="5">5 persona</option>
          <option value="6">6 persona</option>
          <option value="7">7 persona</option>
          <option value="8">8+ persona</option>
        </select>
      </div>
      
      <button type="submit" class="btn-submit">
        📅 Rezervo Tani
      </button>
    </form>
    
    <div class="success-message" id="success">
      <h2>✅ Rezervimi u Konfirmua!</h2>
      <div class="code-display" id="codeDisplay"></div>
      <p><strong>Kodi juaj u dërgua në SMS!</strong></p>
      <p style="margin-top: 1rem; font-size: 0.875rem;">
        Përdorni këtë kod në kiosk kur të vini në restorant.
      </p>
    </div>
  </div>

  <script>
    const form = document.getElementById('reservationForm');
    const successDiv = document.getElementById('success');
    const errorDiv = document.getElementById('error');
    const codeDisplay = document.getElementById('codeDisplay');
    const tableSelect = document.getElementById('table');
    
    // Set minimum date to today
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('date').min = today;
    document.getElementById('date').value = today;
    
    // Set default time
    document.getElementById('time').value = '19:00';
    
    // Load available tables
    async function loadTables() {
      try {
        const res = await fetch('http://localhost:3000/tables');
        const tables = await res.json();
        
        // Show only FREE tables
        const freeTables = tables.filter(t => t.status === 'free');
        
        if (freeTables.length === 0) {
          tableSelect.innerHTML = '<option value="">Nuk ka tavolina të lira</option>';
          return;
        }
        
        tableSelect.innerHTML = '<option value="">Zgjidhni tavolinë...</option>';
        freeTables.forEach(table => {
          const option = document.createElement('option');
          option.value = table.id;
          option.textContent = `Tavolina ${table.table_number}`;
          tableSelect.appendChild(option);
        });
      } catch (err) {
        console.error('Error loading tables:', err);
      }
    }
    
    // Load tables on page load
    loadTables();
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const data = {
        customer_name: document.getElementById('name').value,
        customer_phone: document.getElementById('phone').value,
        reservation_date: document.getElementById('date').value,
        reservation_time: document.getElementById('time').value + ':00',
        party_size: parseInt(document.getElementById('partySize').value),
        table_id: parseInt(document.getElementById('table').value)
      };
      
      try {
        const res = await fetch('http://localhost:3000/reservations', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(data)
        });
        
        if (!res.ok) throw new Error('Reservation failed');
        
        const result = await res.json();
        
        // Show success
        form.style.display = 'none';
        successDiv.classList.add('show');
        codeDisplay.textContent = result.reservation.reservation_code;
        
        // Update success message with table info
        const tableNumber = tables.find(t => t.id === data.table_id)?.table_number || data.table_id;
        document.querySelector('#success p:last-child').innerHTML = 
          `Tavolina: <strong>${tableNumber}</strong><br>` +
          `Përdorni kodin në kiosk kur të vini.`;
        
      } catch (error) {
        errorDiv.textContent = '❌ Gabim në rezervim. Provoni përsëri.';
        errorDiv.classList.add('show');
        setTimeout(() => errorDiv.classList.remove('show'), 3000);
      }
    });
  </script>
</body>
</html>
